name: Lint Check

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '*'

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      DEV_IMAGE: agentic-dashboard:dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image
        run: |
          docker build \
            --target dev \
            -t ${DEV_IMAGE} \
            -f docker/Dockerfile \
            .

      - name: Lint with ruff
        run: |
          docker run --rm ${DEV_IMAGE} uv run ruff check app/ tests/ --diff
          echo "No issues found with Ruff"

      - name: Format check with ruff
        run: |
          docker run --rm ${DEV_IMAGE} uv run ruff format --check app/ tests/ --diff
          echo "No formatting issues found"

      - name: Type check with mypy
        run: |
          docker run --rm ${DEV_IMAGE} uv run mypy app/
          echo "No issues found with mypy"
