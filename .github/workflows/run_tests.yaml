name: Tests

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '*'

jobs:
  test-backend:
    runs-on: ubuntu-latest
    env:
      DEV_IMAGE: agentic-dashboard:dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image
        run: |
          docker build \
            --target dev \
            -t ${DEV_IMAGE} \
            -f docker/Dockerfile \
            .

      - name: Run tests
        run: |
          docker run --rm \
            -e MCP_URL=http://test-mcp/sse \
            ${DEV_IMAGE}
