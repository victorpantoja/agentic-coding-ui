name: agentic-dashboard

networks:
  dashboard-net:
    driver: bridge
  sovereign-net:
    external: true
    name: sovereign-net

services:
  backend:
    image: agentic-dashboard:dev
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    volumes:
      - ./backend/app:/app/app
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://sovereign:sovereign@sovereign-brain-postgres:5432/sovereign_brain}
    networks:
      - dashboard-net
      - sovereign-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: agentic-dashboard:frontend-dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dashboard-net
