name: agentic-dashboard

networks:
  dashboard-net:
    driver: bridge
  sovereign-net:
    external: true
    name: sovereign-net

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: prod
    restart: unless-stopped
    environment:
      MCP_URL: ${MCP_URL:-http://mcp-server:8000/sse}
      CORS_ORIGINS: '["http://localhost:80","http://frontend:80","http://localhost:5173"]'
    networks:
      - dashboard-net
      - sovereign-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      target: production
    restart: unless-stopped
    ports:
      - "8090:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dashboard-net
